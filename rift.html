<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Project Rift</title>
<style>
  :root{
    --bg:#070a11; --panel:#0e1421; --panel2:#0b1019; --line:#1e2940;
    --ink:#e8eefb; --dim:#8f9fbb; --muted:#5f6f8c; --gold:#e7b64b;
    --mono:ui-monospace,"SF Mono",Menlo,Consolas,monospace;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{background:
      radial-gradient(1100px 700px at 50% -12%, #16213a55, transparent 60%),
      radial-gradient(900px 600px at 100% 120%, #1b1030aa, transparent 55%),
      var(--bg);
    color:var(--ink); font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
    -webkit-font-smoothing:antialiased;}

  /* ---- class-select menu ---- */
  #menu{min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:48px 24px; gap:8px}
  .kicker{font:600 12px var(--mono); letter-spacing:5px; text-transform:uppercase; color:var(--muted)}
  .brand{font-size:clamp(38px,7vw,74px); font-weight:800; letter-spacing:3px; margin:2px 0 0;
    background:linear-gradient(180deg,#fff,#9fb2d6); -webkit-background-clip:text; background-clip:text; color:transparent}
  .sub{color:var(--dim); font-size:15px; margin-bottom:30px}
  .sub b{color:var(--gold); font-weight:600}

  .grid{display:grid; grid-template-columns:repeat(2,minmax(260px,340px)); gap:18px; width:100%; max-width:740px}
  @media (max-width:640px){ .grid{grid-template-columns:1fr; max-width:420px} }

  .card{position:relative; text-align:left; background:linear-gradient(180deg,var(--panel),var(--panel2));
    border:1px solid var(--line); border-radius:16px; padding:22px 22px 20px 26px; cursor:pointer;
    transition:transform .16s ease, border-color .16s ease, box-shadow .16s ease; overflow:hidden}
  .card::before{content:""; position:absolute; left:0; top:0; bottom:0; width:5px; background:var(--c)}
  .card::after{content:""; position:absolute; inset:0; background:radial-gradient(360px 160px at 0% 0%, var(--c), transparent 70%);
    opacity:.06; transition:opacity .16s ease}
  .card:hover{transform:translateY(-5px); border-color:var(--c)}
  .card:hover::after{opacity:.16}
  .card .role{font:700 10px var(--mono); letter-spacing:2px; text-transform:uppercase; color:var(--c)}
  .card .cls{font-size:27px; font-weight:800; letter-spacing:.5px; margin:3px 0 8px}
  .card .pitch{color:var(--dim); font-size:13.5px; line-height:1.5; min-height:40px}
  .card .aspects{display:flex; gap:8px; margin-top:14px; flex-wrap:wrap}
  .chip{font:600 11px var(--mono); color:var(--ink); background:#ffffff0a; border:1px solid var(--line);
    border-radius:999px; padding:4px 11px}
  .chip .dot{display:inline-block; width:6px; height:6px; border-radius:50%; background:var(--c); margin-right:6px; vertical-align:middle}
  .go{position:absolute; right:20px; bottom:18px; font:700 20px var(--mono); color:var(--c); opacity:.5; transition:.16s}
  .card:hover .go{opacity:1; transform:translateX(3px)}

  .foot{margin-top:32px; color:var(--muted); font-size:12.5px; text-align:center; line-height:1.7}
  .foot .kbd{font:600 11px var(--mono); border:1px solid var(--line); border-radius:5px; padding:1px 6px; color:var(--dim)}

  /* ---- in-game top bar + host ---- */
  #bar{display:none; align-items:center; gap:14px; height:52px; padding:0 16px;
    background:linear-gradient(180deg,#0d1320,#0a0f18); border-bottom:1px solid var(--line);
    position:sticky; top:0; z-index:10}
  #bar button{font:600 13px system-ui; color:var(--ink); background:#ffffff0d; border:1px solid var(--line);
    border-radius:9px; padding:8px 14px; cursor:pointer; transition:.14s}
  #bar button:hover{background:#ffffff18; border-color:#3a5b8c}
  #barTitle{font:700 14px var(--mono); letter-spacing:1px; color:var(--dim)}
  #barTitle b{color:var(--ink)}
  #host{display:none; width:100%; height:calc(100vh - 52px)}
  #host iframe.game{width:100%; height:100%; border:0; display:block; background:var(--bg)}
</style>
</head>
<body>

  <div id="bar">
    <button onclick="roster()">&larr; Roster</button>
    <span id="barTitle"></span>
  </div>

  <div id="menu">
    <div class="kicker">Project</div>
    <h1 class="brand">RIFT</h1>
    <div class="sub">Real-time co-op raiding — <b>no movement</b>, just the decisions. Pick your class.</div>

    <div class="grid">
      <button class="card" style="--c:#5b8fd6" onclick="mount('bulwark')">
        <div class="role">Tank</div>
        <div class="cls">Bulwark</div>
        <div class="pitch">Stand in front. Eat what you can, parry what you can't, and choose when to gamble your wall.</div>
        <div class="aspects"><span class="chip"><span class="dot"></span>Warden</span><span class="chip"><span class="dot"></span>Juggernaut</span></div>
        <span class="go">&rarr;</span>
      </button>

      <button class="card" style="--c:#e0574c" onclick="mount('twinfang')">
        <div class="role">Melee DPS</div>
        <div class="cls">Twinfang</div>
        <div class="pitch">Drive the rhythm. The deeper you hold the flow, the deadlier the blade — or stack poisons and detonate.</div>
        <div class="aspects"><span class="chip"><span class="dot"></span>Tempo</span><span class="chip"><span class="dot"></span>Venomancer</span></div>
        <span class="go">&rarr;</span>
      </button>

      <button class="card" style="--c:#a97be0" onclick="mount('voidcaller')">
        <div class="role">Caster DPS</div>
        <div class="cls">Voidcaller</div>
        <div class="pitch">No dodge. Read the boss's casts and break the right one, every time — un-kicked heals heal it.</div>
        <div class="aspects"><span class="chip"><span class="dot"></span>Disruptor</span><span class="chip"><span class="dot"></span>Silencer</span></div>
        <span class="go">&rarr;</span>
      </button>

      <button class="card" style="--c:#3fbf8f" onclick="mount('mender')">
        <div class="role">Healer</div>
        <div class="cls">Mender</div>
        <div class="pitch">No character to steer — keep the party alive while they burn it down. Bank the calm, or gamble on the edge.</div>
        <div class="aspects"><span class="chip"><span class="dot"></span>Tidecaller</span><span class="chip"><span class="dot"></span>Brinkwarden</span></div>
        <span class="go">&rarr;</span>
      </button>
    </div>

    <div class="foot">
      Solo-playable with AI allies. Support class coming soon.<br>
      Each class picks one of two <b style="color:var(--gold)">Aspects</b> at the start. Press <span class="kbd">P</span> or <span class="kbd">Esc</span> in a fight to pause.
    </div>
  </div>

  <div id="host"></div>

const TITLES={
  bulwark:'Bulwark <b>Tank</b>',
  twinfang:'Twinfang <b>Melee DPS</b>',
  voidcaller:'Voidcaller <b>Caster DPS</b>',
  mender:'Mender <b>Healer</b>'
};
function decode(b){var s=atob(b);var a=new Uint8Array(s.length);for(var i=0;i<s.length;i++)a[i]=s.charCodeAt(i);return new TextDecoder('utf-8').decode(a);}
function mount(k){
  document.getElementById('menu').style.display='none';
  var bar=document.getElementById('bar'); bar.style.display='flex';
  document.getElementById('barTitle').innerHTML=TITLES[k];
  var host=document.getElementById('host'); host.style.display='block'; host.innerHTML='';
  var f=document.createElement('iframe'); f.className='game'; f.setAttribute('title', k);
  f.srcdoc=decode(GAMES[k]);
  host.appendChild(f);
  setTimeout(function(){ try{ f.contentWindow.focus(); }catch(e){} }, 60);
  window.scrollTo(0,0);
}
function roster(){
  var host=document.getElementById('host'); host.innerHTML=''; host.style.display='none';
  document.getElementById('bar').style.display='none';
  document.getElementById('menu').style.display='flex';
}
</script>
